services:
  - type: web
    name: golden-bird-crm
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /login
    envVars:
      - key: APP_NAME
        value: "Bluebird CRM"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: golden-bird-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: golden-bird-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: golden-bird-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: golden-bird-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: golden-bird-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: LOG_CHANNEL
        value: stderr
      - key: VITE_APP_NAME
        value: "Golden Bird CRM"

databases:
  - name: golden-bird-db
    databaseName: golden_bird_crm
    user: goldenbird
    plan: free
    region: singapore
